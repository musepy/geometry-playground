<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Halftone Field — 几何半调实验室</title>
  <style>
    :root {
      --ink: #171714;
      --panel: #20201c;
      --panel-2: #292923;
      --line: #3a3a32;
      --muted: #98988c;
      --paper: #f2efe6;
      --acid: #d7ff43;
      --orange: #ff7043;
      --shadow: 0 24px 70px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--paper);
      background:
        radial-gradient(circle at 70% -20%, rgba(215, 255, 67, .07), transparent 38%),
        #151512;
      font-family: "Avenir Next", "Gill Sans", "Noto Sans SC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; }
    button { color: inherit; }

    .app {
      display: grid;
      grid-template-columns: 356px minmax(0, 1fr);
      height: 100%;
    }

    .sidebar {
      position: relative;
      z-index: 2;
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(28, 28, 24, .96);
      box-shadow: 18px 0 60px rgba(0, 0, 0, .22);
    }

    .brand {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      padding: 24px 22px 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--acid);
      font: 700 10px/1 "Avenir Next Condensed", sans-serif;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font: 500 25px/.95 "Iowan Old Style", "Baskerville", serif;
      letter-spacing: -.035em;
    }

    .index-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--muted);
      font: 600 10px/1 monospace;
      transform: rotate(3deg);
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 42px 42px;
      gap: 7px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: #252520;
      cursor: pointer;
      transition: border-color .18s, background .18s, color .18s, transform .12s;
    }

    .btn:hover { border-color: #626255; background: #303029; }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible, input:focus-visible, select:focus-visible {
      outline: 2px solid var(--acid);
      outline-offset: 2px;
    }

    .btn-primary {
      border-color: var(--acid);
      color: #171714;
      background: var(--acid);
      font-weight: 700;
    }

    .btn-primary:hover { border-color: #e5ff83; background: #e5ff83; }

    .icon-btn {
      display: grid;
      padding: 0;
      place-items: center;
    }

    .icon-btn svg { width: 17px; height: 17px; }

    .config-strip {
      min-width: 0;
      padding: 13px 14px 12px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: #1b1b18;
    }

    .section-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .dirty-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-left: 5px;
      border-radius: 50%;
      background: var(--orange);
      opacity: 0;
      transform: scale(.5);
      transition: .18s;
    }

    .dirty .dirty-dot { opacity: 1; transform: scale(1); }

    .preset-list {
      display: flex;
      min-width: 0;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .preset-list::-webkit-scrollbar { display: none; }

    .preset-chip {
      position: relative;
      flex: 0 0 auto;
      max-width: 170px;
      padding: 8px 11px;
      overflow: hidden;
      border: 1px solid #393932;
      border-radius: 99px;
      color: #c6c6ba;
      background: transparent;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: .16s;
    }

    .preset-chip:hover, .preset-chip.active {
      border-color: var(--acid);
      color: var(--acid);
      background: rgba(215, 255, 67, .06);
    }

    .preset-chip.user::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      margin: 0 7px 1px 0;
      border-radius: 50%;
      background: var(--orange);
    }

    .controls {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-color: #4a4a40 transparent;
      scrollbar-width: thin;
    }

    .group { border-bottom: 1px solid var(--line); }

    .group-title {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border: 0;
      color: #d9d8ce;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .group-title .count { color: #717168; font: 500 10px/1 monospace; }
    .group-title::after { content: "−"; color: var(--acid); font-size: 17px; font-weight: 400; }
    .group.collapsed .group-title::after { content: "+"; }
    .group.collapsed .group-body { display: none; }

    .group-body { padding: 2px 18px 15px; }

    .control {
      position: relative;
      padding: 9px 0 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .035);
    }

    .control:last-child { border-bottom: 0; }

    .control-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 22px;
      margin-bottom: 7px;
    }

    .control-label {
      color: #b9b9af;
      cursor: default;
      font-size: 12px;
      user-select: none;
    }

    .control:hover .control-label { color: var(--paper); }

    .value-wrap {
      display: flex;
      align-items: baseline;
      color: var(--acid);
    }

    .number-input {
      width: 62px;
      padding: 2px 3px;
      border: 0;
      border-bottom: 1px solid transparent;
      border-radius: 0;
      color: var(--acid);
      background: transparent;
      text-align: right;
      font: 600 11px/1.4 "SFMono-Regular", Consolas, monospace;
      -moz-appearance: textfield;
    }

    .number-input::-webkit-outer-spin-button,
    .number-input::-webkit-inner-spin-button { margin: 0; -webkit-appearance: none; }
    .number-input:hover, .number-input:focus { border-bottom-color: #5a5a4d; outline: 0; }

    .unit { min-width: 16px; color: #68685f; font: 500 9px/1 monospace; }

    input[type="range"] {
      width: 100%;
      height: 12px;
      margin: 0;
      border: 0;
      outline: 0;
      background: transparent;
      cursor: ew-resize;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 2px;
      background: linear-gradient(90deg, var(--acid) var(--fill, 50%), #494940 var(--fill, 50%));
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
      margin-top: -4px;
      border: 1px solid var(--acid);
      border-radius: 50%;
      background: var(--panel);
      box-shadow: 0 0 0 3px rgba(215, 255, 67, .08);
      appearance: none;
    }

    input[type="range"]::-moz-range-track { height: 2px; background: #494940; }
    input[type="range"]::-moz-range-progress { height: 2px; background: var(--acid); }
    input[type="range"]::-moz-range-thumb { width: 9px; height: 9px; border: 1px solid var(--acid); border-radius: 50%; background: var(--panel); }

    .select-input {
      width: 100%;
      height: 34px;
      padding: 0 28px 0 10px;
      border: 1px solid #424239;
      border-radius: 3px;
      color: #d7d7cd;
      background: #252520;
      cursor: pointer;
    }

    .toggle-row .control-head { margin: 0; }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      border: 1px solid #505046;
      border-radius: 20px;
      background: #252520;
      cursor: pointer;
      appearance: none;
      transition: .2s;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #85857a;
      transition: .2s;
    }

    .toggle:checked { border-color: var(--acid); background: rgba(215, 255, 67, .12); }
    .toggle:checked::after { left: 19px; background: var(--acid); }

    .color-line { display: grid; grid-template-columns: 44px 1fr; gap: 8px; }

    input[type="color"] {
      width: 44px;
      height: 34px;
      padding: 3px;
      border: 1px solid #424239;
      border-radius: 3px;
      background: #252520;
      cursor: pointer;
    }

    .hex-input {
      min-width: 0;
      padding: 0 10px;
      border: 1px solid #424239;
      border-radius: 3px;
      color: #d7d7cd;
      background: #252520;
      font: 500 11px/1 monospace;
      text-transform: uppercase;
    }

    .control[hidden] { display: none; }

    .image-drop {
      position: relative;
      display: grid;
      min-height: 86px;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
      padding: 8px;
      overflow: hidden;
      border: 1px dashed #4b4b41;
      border-radius: 4px;
      color: #8d8d82;
      background: #24241f;
      cursor: pointer;
      transition: border-color .18s, background .18s;
    }

    .image-drop:hover, .image-drop.dragging {
      border-color: var(--acid);
      background: rgba(215, 255, 67, .045);
    }

    .image-thumb {
      position: relative;
      display: grid;
      width: 72px;
      height: 68px;
      place-items: center;
      overflow: hidden;
      border: 1px solid #414138;
      background:
        linear-gradient(45deg, #30302a 25%, transparent 25%, transparent 75%, #30302a 75%),
        linear-gradient(45deg, #30302a 25%, #272722 25%, #272722 75%, #30302a 75%);
      background-position: 0 0, 6px 6px;
      background-size: 12px 12px;
    }

    .image-thumb::after {
      content: "IMG";
      color: #66665d;
      font: 600 9px/1 monospace;
      letter-spacing: .12em;
    }

    .image-thumb img {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-copy strong {
      display: block;
      margin-bottom: 4px;
      color: #d1d1c6;
      font-size: 11px;
      font-weight: 600;
    }

    .image-copy small { display: block; max-width: 170px; font-size: 9px; line-height: 1.45; }

    .image-remove {
      position: absolute;
      z-index: 2;
      top: 6px;
      right: 6px;
      display: none;
      width: 22px;
      height: 22px;
      padding: 0;
      border: 1px solid #525247;
      border-radius: 50%;
      color: #b7b7ad;
      background: rgba(23, 23, 20, .88);
      cursor: pointer;
    }

    .image-drop.has-image .image-remove { display: grid; place-items: center; }

    .sidebar-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      border-top: 1px solid var(--line);
      color: #6f6f66;
      background: #191916;
      font: 500 9px/1.3 monospace;
    }

    .sidebar-foot kbd {
      padding: 2px 5px;
      border: 1px solid #3d3d36;
      border-radius: 2px;
      color: #929288;
      font: inherit;
    }

    .workspace {
      position: relative;
      display: grid;
      width: 100%;
      min-width: 0;
      grid-template-rows: 66px minmax(0, 1fr) 32px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        #181815;
      background-size: 24px 24px;
    }

    .workspace::before {
      content: "";
      position: absolute;
      top: -170px;
      right: -110px;
      width: 520px;
      height: 520px;
      border: 1px solid rgba(215, 255, 67, .1);
      border-radius: 50%;
      pointer-events: none;
    }

    .toolbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 24, 21, .9);
      backdrop-filter: blur(12px);
    }

    .doc-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: #c4c4ba;
      font-size: 12px;
    }

    .doc-title strong {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .doc-title span { color: #6d6d64; font: 500 9px/1 monospace; }

    .toolbar-actions { display: flex; align-items: center; gap: 8px; }
    .toolbar-actions .btn { min-height: 34px; padding: 0 13px; font-size: 11px; }

    .canvas-shell {
      position: relative;
      min-height: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }

    .canvas-shell.dragging { cursor: grabbing; }

    .canvas-holder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center;
      will-change: transform;
    }

    canvas {
      display: block;
      background: var(--paper);
      box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,.08);
    }

    .zoom-control {
      position: absolute;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: 34px 54px 34px;
      height: 34px;
      overflow: hidden;
      border: 1px solid #46463e;
      border-radius: 4px;
      background: rgba(29, 29, 25, .94);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .25);
    }

    .zoom-control button {
      border: 0;
      color: #b9b9ae;
      background: transparent;
      cursor: pointer;
    }

    .zoom-control button:hover { color: var(--acid); background: #303029; }

    .zoom-value {
      display: grid;
      place-items: center;
      border-right: 1px solid #46463e;
      border-left: 1px solid #46463e;
      color: #898980;
      font: 500 9px/1 monospace;
    }

    .statusbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-top: 1px solid var(--line);
      color: #74746b;
      background: #181815;
      font: 500 9px/1 monospace;
      letter-spacing: .04em;
    }

    .live { color: var(--acid); }

    .modal-backdrop {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(9, 9, 8, .72);
      backdrop-filter: blur(5px);
    }

    .modal-backdrop.open { display: grid; }

    .modal {
      width: min(420px, calc(100vw - 36px));
      padding: 24px;
      border: 1px solid #55554a;
      border-radius: 5px;
      background: #23231f;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      animation: modal-in .18s ease-out;
    }

    @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.985); } }

    .modal h2 { margin: 0 0 7px; font: 500 24px/1 "Iowan Old Style", serif; }
    .modal p { margin: 0 0 18px; color: #8e8e84; font-size: 12px; line-height: 1.6; }

    .modal input {
      width: 100%;
      height: 44px;
      padding: 0 13px;
      border: 1px solid #55554a;
      border-radius: 3px;
      color: var(--paper);
      background: #1a1a17;
    }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .modal-actions .btn { padding: 0 16px; }

    .toast-stack {
      position: fixed;
      z-index: 30;
      right: 20px;
      top: 82px;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      min-width: 220px;
      padding: 11px 14px;
      border-left: 3px solid var(--acid);
      border-radius: 2px;
      color: #d8d8cf;
      background: #2a2a24;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      font-size: 11px;
      animation: toast-in .22s ease-out;
    }

    @keyframes toast-in { from { opacity: 0; transform: translateX(10px); } }

    .context-menu {
      position: fixed;
      z-index: 40;
      display: none;
      width: 150px;
      overflow: hidden;
      border: 1px solid #4d4d43;
      border-radius: 4px;
      background: #292923;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .context-menu.open { display: block; }
    .context-menu button { width: 100%; padding: 10px 12px; border: 0; color: #c5c5bb; background: transparent; text-align: left; cursor: pointer; font-size: 11px; }
    .context-menu button:hover { color: var(--acid); background: #34342d; }
    .context-menu button.danger:hover { color: #ff8563; }

    @media (max-width: 820px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100%; }
      .sidebar { width: 100%; height: auto; max-height: none; border-right: 0; }
      .controls { max-height: 50vh; }
      .workspace { height: 72vh; min-height: 540px; }
      .toolbar { padding: 0 14px; }
      .doc-title { flex: 0 1 82px; }
      .doc-title strong { max-width: 82px; }
      .doc-title span { display: none; }
      .toolbar-actions { min-width: 0; gap: 5px; }
      .toolbar-actions .btn { min-height: 32px; padding: 0 8px; font-size: 10px; white-space: nowrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <header class="brand">
        <div>
          <p class="eyebrow">Geometry Playground</p>
          <h1>Halftone Field</h1>
        </div>
        <div class="index-mark">№01</div>
      </header>

      <div class="top-actions">
        <button class="btn btn-primary" id="saveConfigBtn" type="button">保存当前配置</button>
        <button class="btn icon-btn" id="saveAsBtn" type="button" title="另存为新配置" aria-label="另存为">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="btn icon-btn" id="resetBtn" type="button" title="恢复默认参数（双击任意参数名也可单项复位）" aria-label="恢复默认">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 7v5h5M20 17v-5h-5"/><path d="M6.1 16a7 7 0 0 0 11.4 1M17.9 8A7 7 0 0 0 6.5 7"/></svg>
        </button>
      </div>

      <section class="config-strip" id="configStrip">
        <div class="section-kicker">
          <span>配置库 <i class="dirty-dot"></i></span>
          <span id="configCount">3 内置</span>
        </div>
        <div class="preset-list" id="presetList" aria-label="参数配置列表"></div>
      </section>

      <div class="controls" id="controls" aria-label="效果参数"></div>

      <footer class="sidebar-foot">
        <span>双击参数名恢复默认</span>
        <span><kbd>R</kbd> 换种子</span>
      </footer>
    </aside>

    <section class="workspace">
      <header class="toolbar">
        <div class="doc-title">
          <strong id="currentTitle">默认</strong>
          <span id="dirtyLabel">已同步</span>
        </div>
        <div class="toolbar-actions">
          <button class="btn" id="randomizeBtn" type="button">随机种子</button>
          <button class="btn" id="jsonBtn" type="button">导出配置</button>
          <button class="btn btn-primary" id="exportBtn" type="button">导出 PNG</button>
        </div>
      </header>

      <div class="canvas-shell" id="canvasShell" title="滚轮缩放 · 拖动画布 · 双击适配窗口">
        <div class="canvas-holder" id="canvasHolder"><canvas id="preview"></canvas></div>
        <div class="zoom-control" aria-label="画布缩放">
          <button id="zoomOut" type="button" aria-label="缩小">−</button>
          <div class="zoom-value" id="zoomValue">100%</div>
          <button id="zoomIn" type="button" aria-label="放大">+</button>
        </div>
      </div>

      <footer class="statusbar">
        <span><b class="live">● LIVE</b> &nbsp; <span id="shapeCount">0</span> ELEMENTS</span>
        <span id="outputSize">1600 × 2000 PX</span>
      </footer>
    </section>
  </main>

  <div class="modal-backdrop" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <form class="modal" id="nameForm">
      <h2 id="modalTitle">保存参数配置</h2>
      <p id="modalDescription">为当前效果命名，它会保存在这台设备的浏览器中。</p>
      <input id="configName" maxlength="32" autocomplete="off" placeholder="例如：细密颗粒 01" required />
      <div class="modal-actions">
        <button class="btn" id="cancelModal" type="button">取消</button>
        <button class="btn btn-primary" type="submit">保存配置</button>
      </div>
    </form>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <div class="context-menu" id="contextMenu">
    <button data-action="rename" type="button">重命名</button>
    <button data-action="duplicate" type="button">复制配置</button>
    <button class="danger" data-action="delete" type="button">删除配置</button>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "halftone-field-configs-v1";
      const LAST_KEY = "halftone-field-last-state-v1";

      const schema = [
        {
          id: "pattern", label: "网格 / Pattern", controls: [
            { key: "shape", label: "基础图形", type: "select", default: "triangle", options: [["triangle", "三角形"], ["circle", "圆形"], ["square", "方形"], ["diamond", "菱形"], ["line", "线段"]] },
            { key: "cellSize", label: "单元尺寸", type: "range", min: 12, max: 84, step: 1, default: 32, unit: "px" },
            { key: "shapeScale", label: "图形占比", type: "range", min: .15, max: 1.35, step: .01, default: .94, display: "percent" },
            { key: "aspect", label: "图形纵横比", type: "range", min: .3, max: 2, step: .01, default: 1 },
            { key: "shapeRotation", label: "图形旋转", type: "range", min: -180, max: 180, step: 1, default: 0, unit: "°" },
            { key: "alternate", label: "交替翻转", type: "toggle", default: true }
          ]
        },
        {
          id: "fade", label: "尺寸场 / Size Field", controls: [
            { key: "sizeField", label: "尺寸分布", type: "select", default: "linear", options: [["linear", "线性 · Linear"], ["radial", "径向 · Radial"], ["grid", "规则网格 · Grid"], ["random", "随机场 · Random"], ["image", "图片亮度 · Image"]] },
            { key: "fadeAngle", label: "线性方向", type: "range", min: -180, max: 180, step: 1, default: 0, unit: "°", modes: ["linear"] },
            { key: "fadeStart", label: "线性起点", type: "range", min: -.2, max: 1.2, step: .01, default: .43, display: "percent", modes: ["linear"] },
            { key: "fadeWidth", label: "过渡宽度", type: "range", min: .02, max: 1.2, step: .01, default: .28, display: "percent", modes: ["linear"] },
            { key: "fieldCenterX", label: "中心 X", type: "range", min: 0, max: 1, step: .01, default: .5, display: "percent", modes: ["radial"] },
            { key: "fieldCenterY", label: "中心 Y", type: "range", min: 0, max: 1, step: .01, default: .5, display: "percent", modes: ["radial"] },
            { key: "fieldRadius", label: "半径 / 扩散", type: "range", min: .08, max: 1.5, step: .01, default: .42, display: "percent", modes: ["radial", "grid"] },
            { key: "fieldCount", label: "径向场数量", type: "range", min: 1, max: 16, step: 1, default: 1, modes: ["radial"] },
            { key: "fieldLayout", label: "多中心排列", type: "select", default: "regular", options: [["regular", "规则矩阵"], ["random", "随机分布"]], modes: ["radial"] },
            { key: "fieldSpread", label: "多中心范围", type: "range", min: .05, max: 1.4, step: .01, default: .75, display: "percent", modes: ["radial"] },
            { key: "fieldGridX", label: "网格列数", type: "range", min: 1, max: 16, step: 1, default: 5, modes: ["grid"] },
            { key: "fieldGridY", label: "网格行数", type: "range", min: 1, max: 20, step: 1, default: 7, modes: ["grid"] },
            { key: "randomType", label: "随机类型", type: "select", default: "smooth", options: [["smooth", "连续噪声"], ["cell", "逐格随机"]], modes: ["random"] },
            { key: "randomScale", label: "随机尺度", type: "range", min: .5, max: 24, step: .1, default: 7, modes: ["random"] },
            { key: "gamma", label: "衰减曲线", type: "range", min: .2, max: 4, step: .05, default: 1.25 },
            { key: "minSize", label: "末端尺寸", type: "range", min: 0, max: .8, step: .01, default: .02, display: "percent" },
            { key: "sizeFade", label: "尺寸渐隐", type: "toggle", default: true },
            { key: "opacityFade", label: "透明度渐隐", type: "toggle", default: false }
          ]
        },
        {
          id: "dissolve", label: "消散 / Dissolve", controls: [
            { key: "dropout", label: "消失概率", type: "range", min: 0, max: 1, step: .01, default: .72, display: "percent" },
            { key: "noiseAmount", label: "边缘噪声", type: "range", min: 0, max: .7, step: .01, default: .14, display: "percent" },
            { key: "noiseScale", label: "噪声尺度", type: "range", min: .5, max: 18, step: .1, default: 5.2 },
            { key: "positionJitter", label: "位置抖动", type: "range", min: 0, max: .8, step: .01, default: .04, display: "percent" },
            { key: "rotationJitter", label: "角度抖动", type: "range", min: 0, max: 90, step: 1, default: 5, unit: "°" },
            { key: "sizeJitter", label: "尺寸抖动", type: "range", min: 0, max: .8, step: .01, default: .08, display: "percent" },
            { key: "seed", label: "随机种子", type: "range", min: 1, max: 9999, step: 1, default: 253 }
          ]
        },
        {
          id: "mask", label: "边界 / Mask", controls: [
            { key: "maskShape", label: "遮罩形状", type: "select", default: "band", options: [["band", "矩形带"], ["ellipse", "椭圆"], ["full", "全画布"]] },
            { key: "maskX", label: "水平位置", type: "range", min: 0, max: 1, step: .01, default: .45, display: "percent" },
            { key: "maskY", label: "垂直位置", type: "range", min: 0, max: 1, step: .01, default: .5, display: "percent" },
            { key: "maskWidth", label: "遮罩宽度", type: "range", min: .05, max: 1.4, step: .01, default: .5, display: "percent" },
            { key: "maskHeight", label: "遮罩高度", type: "range", min: .05, max: 1.4, step: .01, default: .9, display: "percent" }
          ]
        },
        {
          id: "image", label: "图片 / Image", controls: [
            { key: "imageData", label: "叠加图片", type: "image", default: "" },
            { key: "imageInfluence", label: "尺寸映射强度", type: "range", min: 0, max: 1, step: .01, default: 0, display: "percent" },
            { key: "imageOpacity", label: "可见叠加透明度", type: "range", min: 0, max: 1, step: .01, default: 0, display: "percent" },
            { key: "imageFit", label: "图片适配", type: "select", default: "cover", options: [["cover", "覆盖 · Cover"], ["contain", "完整 · Contain"], ["stretch", "拉伸 · Stretch"]] }
          ]
        },
        {
          id: "output", label: "颜色 / Output", controls: [
            { key: "foreground", label: "图形颜色", type: "color", default: "#11110f" },
            { key: "background", label: "背景颜色", type: "color", default: "#f5f2e9" },
            { key: "invert", label: "反转渐隐", type: "toggle", default: false },
            { key: "ratio", label: "画布比例", type: "select", default: "4:5", options: [["1:1", "方形 · 1:1"], ["4:5", "竖幅 · 4:5"], ["3:4", "竖幅 · 3:4"], ["16:9", "横幅 · 16:9"], ["9:16", "故事 · 9:16"]] },
            { key: "resolution", label: "导出宽度", type: "range", min: 800, max: 4000, step: 100, default: 1600, unit: "px" }
          ]
        }
      ];

      const controlsByKey = new Map();
      const defaults = {};
      schema.forEach(group => group.controls.forEach(control => {
        defaults[control.key] = control.default;
        controlsByKey.set(control.key, control);
      }));

      const builtIns = [
        { id: "default", name: "默认", state: { ...defaults } },
        { id: "soft-grain", name: "柔和颗粒", state: { ...defaults, shape: "circle", cellSize: 26, fadeWidth: .42, gamma: .72, dropout: .35, opacityFade: true, noiseAmount: .22, positionJitter: .12, sizeJitter: .22, maskShape: "ellipse", maskWidth: .7 } },
        { id: "sharp-drift", name: "锐利风蚀", state: { ...defaults, cellSize: 24, fadeAngle: -18, fadeStart: .33, fadeWidth: .46, gamma: 2.2, dropout: .92, noiseAmount: .31, noiseScale: 8.4, positionJitter: .28, rotationJitter: 34, sizeJitter: .32, maskWidth: .72 } },
        { id: "radial-orbit", name: "径向轨道", state: { ...defaults, sizeField: "radial", fieldCount: 1, fieldRadius: .52, maskShape: "full", dropout: .18, noiseAmount: .06, gamma: .82 } },
        { id: "multi-field", name: "多点矩阵", state: { ...defaults, sizeField: "radial", fieldCount: 9, fieldLayout: "regular", fieldSpread: .72, fieldRadius: .2, maskShape: "full", dropout: .16, gamma: 1.4, cellSize: 25 } },
        { id: "grid-pulse", name: "规则脉冲", state: { ...defaults, sizeField: "grid", fieldGridX: 5, fieldGridY: 7, fieldRadius: .78, maskShape: "full", dropout: .12, noiseAmount: .03, cellSize: 24 } },
        { id: "random-field", name: "随机地形", state: { ...defaults, sizeField: "random", randomType: "smooth", randomScale: 8.5, maskShape: "full", dropout: .38, noiseAmount: .08, cellSize: 23, sizeJitter: .16 } }
      ];

      let userConfigs = loadConfigs();
      let state = loadLastState() || { ...defaults };
      state = sanitizeState(state);
      let currentConfig = { type: "builtIn", id: "default", name: "默认" };
      let dirty = Boolean(loadLastState());
      let modalMode = "save";
      let editingConfigId = null;
      let contextConfigId = null;
      let renderQueued = false;
      let sourceImage = null;
      let sourceImageUrl = "";
      let view = { zoom: 1, fitZoom: 1, x: 0, y: 0 };

      const els = {
        controls: document.querySelector("#controls"),
        presetList: document.querySelector("#presetList"),
        configCount: document.querySelector("#configCount"),
        configStrip: document.querySelector("#configStrip"),
        currentTitle: document.querySelector("#currentTitle"),
        dirtyLabel: document.querySelector("#dirtyLabel"),
        preview: document.querySelector("#preview"),
        canvasShell: document.querySelector("#canvasShell"),
        canvasHolder: document.querySelector("#canvasHolder"),
        zoomValue: document.querySelector("#zoomValue"),
        shapeCount: document.querySelector("#shapeCount"),
        outputSize: document.querySelector("#outputSize"),
        nameModal: document.querySelector("#nameModal"),
        nameForm: document.querySelector("#nameForm"),
        configName: document.querySelector("#configName"),
        modalTitle: document.querySelector("#modalTitle"),
        modalDescription: document.querySelector("#modalDescription"),
        toastStack: document.querySelector("#toastStack"),
        contextMenu: document.querySelector("#contextMenu")
      };

      function loadConfigs() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch { return []; }
      }

      function loadLastState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(LAST_KEY) || "null");
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch { return null; }
      }

      function sanitizeState(candidate) {
        const clean = { ...defaults };
        for (const [key, control] of controlsByKey) {
          const value = candidate[key];
          if (control.type === "range") {
            const number = Number(value);
            clean[key] = Number.isFinite(number) ? clamp(number, control.min, control.max) : control.default;
          } else if (control.type === "toggle") {
            clean[key] = typeof value === "boolean" ? value : control.default;
          } else if (control.type === "color") {
            clean[key] = /^#[0-9a-f]{6}$/i.test(value) ? value : control.default;
          } else if (control.type === "select") {
            clean[key] = control.options.some(option => option[0] === value) ? value : control.default;
          } else if (control.type === "image") {
            clean[key] = typeof value === "string" && (value === "" || value.startsWith("data:image/")) ? value : control.default;
          }
        }
        return clean;
      }

      function persistConfigs() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(userConfigs));
        } catch {
          toast("配置容量不足，请换用较小图片或删除旧配置");
        }
      }

      function persistLastState() {
        try {
          localStorage.setItem(LAST_KEY, JSON.stringify(state));
        } catch {
          toast("图片容量超过浏览器本地存储限制");
        }
      }

      function buildControls() {
        els.controls.innerHTML = "";
        schema.forEach((group, index) => {
          const section = document.createElement("section");
          section.className = "group";
          section.dataset.group = group.id;

          const title = document.createElement("button");
          title.type = "button";
          title.className = "group-title";
          title.innerHTML = `<span>${group.label} <span class="count">${String(index + 1).padStart(2, "0")}</span></span>`;
          title.addEventListener("click", () => section.classList.toggle("collapsed"));

          const body = document.createElement("div");
          body.className = "group-body";
          group.controls.forEach(control => body.append(createControl(control)));
          section.append(title, body);
          els.controls.append(section);
        });
      }

      function createControl(control) {
        const row = document.createElement("div");
        row.className = `control ${control.type === "toggle" ? "toggle-row" : ""}`;
        row.dataset.key = control.key;
        if (control.modes) row.dataset.modes = control.modes.join(",");

        const head = document.createElement("div");
        head.className = "control-head";
        const label = document.createElement("span");
        label.className = "control-label";
        label.textContent = control.label;
        label.title = "双击恢复此参数默认值";
        label.addEventListener("dblclick", () => {
          setParam(control.key, control.default, true);
          toast(`${control.label} 已恢复默认`);
        });
        head.append(label);

        if (control.type === "range") {
          const valueWrap = document.createElement("div");
          valueWrap.className = "value-wrap";
          const number = document.createElement("input");
          number.className = "number-input";
          number.type = "number";
          number.min = control.min;
          number.max = control.max;
          number.step = control.step;
          number.dataset.role = "number";
          const unit = document.createElement("span");
          unit.className = "unit";
          unit.textContent = control.display === "percent" ? "%" : (control.unit || "");
          valueWrap.append(number, unit);
          head.append(valueWrap);
          const range = document.createElement("input");
          range.type = "range";
          range.min = control.min;
          range.max = control.max;
          range.step = control.step;
          range.dataset.role = "range";
          range.addEventListener("input", () => setParam(control.key, Number(range.value)));
          number.addEventListener("change", () => {
            const entered = Number(number.value);
            const value = control.display === "percent" ? entered / 100 : entered;
            setParam(control.key, clamp(value, control.min, control.max));
          });
          row.append(head, range);
        } else if (control.type === "toggle") {
          const toggle = document.createElement("input");
          toggle.type = "checkbox";
          toggle.className = "toggle";
          toggle.setAttribute("aria-label", control.label);
          toggle.addEventListener("change", () => setParam(control.key, toggle.checked));
          head.append(toggle);
          row.append(head);
        } else if (control.type === "select") {
          row.append(head);
          const select = document.createElement("select");
          select.className = "select-input";
          select.setAttribute("aria-label", control.label);
          control.options.forEach(([value, text]) => select.add(new Option(text, value)));
          select.addEventListener("change", () => setParam(control.key, select.value));
          row.append(select);
        } else if (control.type === "color") {
          row.append(head);
          const line = document.createElement("div");
          line.className = "color-line";
          const picker = document.createElement("input");
          picker.type = "color";
          picker.setAttribute("aria-label", control.label);
          const hex = document.createElement("input");
          hex.className = "hex-input";
          hex.maxLength = 7;
          hex.setAttribute("aria-label", `${control.label}十六进制值`);
          picker.addEventListener("input", () => setParam(control.key, picker.value));
          hex.addEventListener("change", () => {
            const value = hex.value.startsWith("#") ? hex.value : `#${hex.value}`;
            if (/^#[0-9a-f]{6}$/i.test(value)) setParam(control.key, value);
            else syncControls();
          });
          line.append(picker, hex);
          row.append(line);
        } else if (control.type === "image") {
          row.append(head);
          const file = document.createElement("input");
          file.type = "file";
          file.accept = "image/*";
          file.hidden = true;
          file.dataset.role = "file";
          const drop = document.createElement("div");
          drop.className = "image-drop";
          drop.tabIndex = 0;
          drop.setAttribute("role", "button");
          drop.setAttribute("aria-label", "选择或拖入图片");
          drop.innerHTML = `<div class="image-thumb"><img alt="图片预览" hidden></div><div class="image-copy"><strong>选择或拖入图片</strong><small>亮度可驱动尺寸，也可作为可见图层叠加</small></div><button class="image-remove" type="button" aria-label="移除图片">×</button>`;
          const choose = () => file.click();
          drop.addEventListener("click", event => { if (!event.target.closest(".image-remove")) choose(); });
          drop.addEventListener("keydown", event => { if (event.key === "Enter" || event.key === " ") { event.preventDefault(); choose(); } });
          file.addEventListener("change", () => { if (file.files[0]) handleImageFile(file.files[0]); file.value = ""; });
          ["dragenter", "dragover"].forEach(type => drop.addEventListener(type, event => { event.preventDefault(); drop.classList.add("dragging"); }));
          ["dragleave", "drop"].forEach(type => drop.addEventListener(type, event => { event.preventDefault(); drop.classList.remove("dragging"); }));
          drop.addEventListener("drop", event => { const imageFile = [...event.dataTransfer.files].find(item => item.type.startsWith("image/")); if (imageFile) handleImageFile(imageFile); });
          drop.querySelector(".image-remove").addEventListener("click", event => { event.stopPropagation(); setParam("imageData", "", true); toast("图片已移除"); });
          row.append(file, drop);
        }
        return row;
      }

      function setParam(key, value, force = false) {
        if (!force && state[key] === value) return;
        state[key] = value;
        dirty = true;
        persistLastState();
        syncControl(key);
        if (key === "imageData") loadSourceImage(value);
        if (key === "sizeField") syncControlVisibility();
        syncDirtyState();
        scheduleRender();
        if (key === "ratio") requestAnimationFrame(() => requestAnimationFrame(fitCanvas));
      }

      function displayValue(control, value) {
        if (control.display === "percent") return Math.round(value * 100);
        const decimals = String(control.step).includes(".") ? String(control.step).split(".")[1].length : 0;
        return Number(value).toFixed(Math.min(decimals, 2));
      }

      function syncControl(key) {
        const control = controlsByKey.get(key);
        const row = els.controls.querySelector(`[data-key="${key}"]`);
        if (!row) return;
        if (control.type === "range") {
          const range = row.querySelector('[data-role="range"]');
          const number = row.querySelector('[data-role="number"]');
          range.value = state[key];
          number.value = displayValue(control, state[key]);
          if (control.display === "percent") {
            number.min = control.min * 100;
            number.max = control.max * 100;
            number.step = control.step * 100;
          }
          const fill = ((state[key] - control.min) / (control.max - control.min)) * 100;
          range.style.setProperty("--fill", `${fill}%`);
        } else if (control.type === "toggle") {
          row.querySelector("input").checked = state[key];
        } else if (control.type === "select") {
          row.querySelector("select").value = state[key];
        } else if (control.type === "color") {
          row.querySelector('input[type="color"]').value = state[key];
          row.querySelector('.hex-input').value = state[key].toUpperCase();
        } else if (control.type === "image") {
          const drop = row.querySelector(".image-drop");
          const image = drop.querySelector("img");
          const hasImage = Boolean(state[key]);
          drop.classList.toggle("has-image", hasImage);
          image.hidden = !hasImage;
          image.src = hasImage ? state[key] : "";
          drop.querySelector("strong").textContent = hasImage ? "图片已载入" : "选择或拖入图片";
        }
      }

      function syncControls() {
        controlsByKey.forEach((_, key) => syncControl(key));
        syncControlVisibility();
      }

      function syncControlVisibility() {
        els.controls.querySelectorAll("[data-modes]").forEach(row => {
          row.hidden = !row.dataset.modes.split(",").includes(state.sizeField);
        });
      }

      function handleImageFile(file) {
        if (!file || !file.type.startsWith("image/")) {
          toast("请选择图片文件");
          return;
        }
        const reader = new FileReader();
        reader.onerror = () => toast("图片读取失败");
        reader.onload = () => {
          const image = new Image();
          image.onerror = () => toast("无法解析这张图片");
          image.onload = () => {
            const maxSide = 1200;
            const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
            canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            const data = canvas.toDataURL("image/webp", .9);
            setParam("imageData", data, true);
            if (state.sizeField === "image") setParam("imageInfluence", 1, true);
            toast(`图片已载入 · ${canvas.width} × ${canvas.height}`);
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function loadSourceImage(url) {
        sourceImageUrl = url || "";
        if (!sourceImageUrl) {
          sourceImage = null;
          scheduleRender();
          return;
        }
        const pendingImage = new Image();
        pendingImage.onload = () => {
          if (sourceImageUrl !== url) return;
          sourceImage = pendingImage;
          scheduleRender();
        };
        pendingImage.onerror = () => {
          if (sourceImageUrl === url) sourceImage = null;
          toast("保存的图片无法载入");
        };
        pendingImage.src = url;
      }

      function syncDirtyState() {
        els.configStrip.classList.toggle("dirty", dirty);
        els.dirtyLabel.textContent = dirty ? "未保存修改" : "已同步";
        els.currentTitle.textContent = currentConfig.name;
        renderPresetList();
      }

      function renderPresetList() {
        els.presetList.innerHTML = "";
        builtIns.forEach(config => {
          const chip = makePresetChip(config, "builtIn");
          els.presetList.append(chip);
        });
        userConfigs.forEach(config => {
          const chip = makePresetChip(config, "user");
          els.presetList.append(chip);
        });
        els.configCount.textContent = userConfigs.length ? `${builtIns.length} 内置 · ${userConfigs.length} 已保存` : `${builtIns.length} 内置`;
      }

      function makePresetChip(config, type) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = `preset-chip ${type === "user" ? "user" : ""}`;
        chip.textContent = config.name;
        chip.title = type === "user" ? "点击载入 · 右键管理" : "点击载入内置配置";
        chip.classList.toggle("active", currentConfig.type === type && currentConfig.id === config.id);
        chip.addEventListener("click", () => loadConfig(config, type));
        if (type === "user") {
          chip.addEventListener("contextmenu", event => {
            event.preventDefault();
            contextConfigId = config.id;
            openContextMenu(event.clientX, event.clientY);
          });
        }
        return chip;
      }

      function loadConfig(config, type) {
        state = sanitizeState(config.state);
        loadSourceImage(state.imageData);
        currentConfig = { type, id: config.id, name: config.name };
        dirty = false;
        persistLastState();
        syncControls();
        syncDirtyState();
        fitCanvas();
        scheduleRender();
        toast(`已载入「${config.name}」`);
      }

      function saveCurrent() {
        if (currentConfig.type === "user") {
          const config = userConfigs.find(item => item.id === currentConfig.id);
          if (config) {
            config.state = { ...state };
            config.updatedAt = Date.now();
            persistConfigs();
            dirty = false;
            syncDirtyState();
            toast(`「${config.name}」已更新`);
            return;
          }
        }
        openNameModal("save");
      }

      function openNameModal(mode, config = null) {
        modalMode = mode;
        editingConfigId = config?.id || null;
        els.modalTitle.textContent = mode === "rename" ? "重命名配置" : "保存参数配置";
        els.modalDescription.textContent = mode === "rename" ? "输入新的配置名称。" : "为当前效果命名，它会保存在这台设备的浏览器中。";
        els.configName.value = mode === "rename" ? config.name : suggestConfigName();
        els.nameModal.classList.add("open");
        requestAnimationFrame(() => { els.configName.focus(); els.configName.select(); });
      }

      function closeNameModal() {
        els.nameModal.classList.remove("open");
        editingConfigId = null;
      }

      function suggestConfigName() {
        const base = "未命名配置";
        let index = 1;
        while (userConfigs.some(config => config.name === `${base} ${String(index).padStart(2, "0")}`)) index++;
        return `${base} ${String(index).padStart(2, "0")}`;
      }

      function saveNew(name) {
        const config = {
          id: `cfg-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`,
          name,
          state: { ...state },
          updatedAt: Date.now()
        };
        userConfigs.push(config);
        persistConfigs();
        currentConfig = { type: "user", id: config.id, name: config.name };
        dirty = false;
        syncDirtyState();
        toast(`「${name}」已保存`);
      }

      function renameConfig(id, name) {
        const config = userConfigs.find(item => item.id === id);
        if (!config) return;
        config.name = name;
        config.updatedAt = Date.now();
        if (currentConfig.type === "user" && currentConfig.id === id) currentConfig.name = name;
        persistConfigs();
        syncDirtyState();
        toast("配置已重命名");
      }

      function deleteConfig(id) {
        const config = userConfigs.find(item => item.id === id);
        if (!config || !confirm(`删除配置「${config.name}」？`)) return;
        userConfigs = userConfigs.filter(item => item.id !== id);
        persistConfigs();
        if (currentConfig.type === "user" && currentConfig.id === id) {
          currentConfig = { type: "builtIn", id: "default", name: "默认" };
          dirty = true;
        }
        syncDirtyState();
        toast("配置已删除");
      }

      function duplicateConfig(id) {
        const source = userConfigs.find(item => item.id === id);
        if (!source) return;
        const copy = { ...source, id: `cfg-${Date.now().toString(36)}`, name: `${source.name} 副本`, state: { ...source.state }, updatedAt: Date.now() };
        userConfigs.push(copy);
        persistConfigs();
        renderPresetList();
        toast("已复制配置");
      }

      function openContextMenu(x, y) {
        const menu = els.contextMenu;
        menu.classList.add("open");
        const width = 150;
        const height = 112;
        menu.style.left = `${Math.min(x, innerWidth - width - 8)}px`;
        menu.style.top = `${Math.min(y, innerHeight - height - 8)}px`;
      }

      function closeContextMenu() { els.contextMenu.classList.remove("open"); }

      function resetAll() {
        state = { ...defaults };
        loadSourceImage("");
        currentConfig = { type: "builtIn", id: "default", name: "默认" };
        dirty = false;
        localStorage.removeItem(LAST_KEY);
        syncControls();
        syncDirtyState();
        fitCanvas();
        scheduleRender();
        toast("已恢复默认参数");
      }

      function randomizeSeed() {
        setParam("seed", 1 + Math.floor(Math.random() * 9999));
        toast(`随机种子 · ${state.seed}`);
      }

      function scheduleRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
          renderQueued = false;
          renderPreview();
        });
      }

      function parseRatio() {
        const [w, h] = state.ratio.split(":").map(Number);
        return w / h;
      }

      function renderPreview() {
        const ratio = parseRatio();
        const logicalWidth = 1000;
        const logicalHeight = logicalWidth / ratio;
        const maxPreview = 1100;
        const dpr = Math.min(devicePixelRatio || 1, 2);
        let cssWidth = Math.min(maxPreview, logicalWidth);
        let cssHeight = cssWidth / ratio;
        if (cssHeight > maxPreview) {
          cssHeight = maxPreview;
          cssWidth = cssHeight * ratio;
        }
        els.preview.style.width = `${cssWidth}px`;
        els.preview.style.height = `${cssHeight}px`;
        els.preview.width = Math.round(cssWidth * dpr);
        els.preview.height = Math.round(cssHeight * dpr);
        const ctx = els.preview.getContext("2d");
        ctx.setTransform((cssWidth * dpr) / logicalWidth, 0, 0, (cssWidth * dpr) / logicalWidth, 0, 0);
        const count = drawField(ctx, logicalWidth, logicalHeight);
        els.shapeCount.textContent = count.toLocaleString("zh-CN");
        const outputWidth = Math.round(state.resolution);
        const outputHeight = Math.round(outputWidth / ratio);
        els.outputSize.textContent = `${outputWidth} × ${outputHeight} PX`;
        updateCanvasTransform();
      }

      function drawField(ctx, width, height) {
        ctx.save();
        ctx.fillStyle = state.background;
        ctx.fillRect(0, 0, width, height);
        const imageSampler = createImageSampler(width, height);
        if (sourceImage && state.imageOpacity > 0) {
          ctx.save();
          ctx.globalAlpha = state.imageOpacity;
          drawFittedImage(ctx, sourceImage, width, height, state.imageFit);
          ctx.restore();
        }
        ctx.fillStyle = state.foreground;

        const cell = state.cellSize;
        const dy = cell * Math.sqrt(3) / 2;
        const cols = Math.ceil(width / cell) + 5;
        const rows = Math.ceil(height / dy) + 5;
        const fieldContext = createFieldContext(width, height, imageSampler);
        let visibleCount = 0;

        for (let row = -2; row < rows; row++) {
          const baseY = row * dy;
          const offset = (row & 1) ? cell * .5 : 0;
          for (let col = -2; col < cols; col++) {
            const baseX = col * cell + offset;
            const nx = baseX / width;
            const ny = baseY / height;
            if (!insideMask(nx, ny)) continue;

            const noise = (valueNoise(nx * state.noiseScale, ny * state.noiseScale, state.seed) - .5) * 2 * state.noiseAmount;
            let t = clamp(sampleSizeField(nx, ny, col, row, fieldContext) + noise, 0, 1);
            if (state.invert) t = 1 - t;
            const eased = Math.pow(smoothstep(t), state.gamma);

            const random = hash2(col, row, state.seed);
            if (random < eased * state.dropout) continue;

            const jitterX = (hash2(col + 31, row - 17, state.seed) - .5) * cell * state.positionJitter;
            const jitterY = (hash2(col - 53, row + 29, state.seed) - .5) * cell * state.positionJitter;
            const randomScale = 1 + (hash2(col + 7, row + 73, state.seed) - .5) * 2 * state.sizeJitter;
            const sizeFade = state.sizeFade ? lerp(1, state.minSize, eased) : 1;
            const size = cell / Math.sqrt(3) * state.shapeScale * sizeFade * randomScale;
            if (size < .18) continue;
            const alpha = state.opacityFade ? Math.max(0, 1 - eased) : 1;
            if (alpha < .01) continue;

            const jitterRotation = (hash2(col - 91, row + 11, state.seed) - .5) * 2 * state.rotationJitter;
            let rotation = state.shapeRotation + jitterRotation;
            if (state.alternate && ((col + row) & 1)) rotation += 180;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(baseX + jitterX, baseY + jitterY);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.scale(1, state.aspect);
            drawShape(ctx, state.shape, size);
            ctx.restore();
            visibleCount++;
          }
        }
        ctx.restore();
        return visibleCount;
      }

      function createFieldContext(width, height, imageSampler) {
        const angle = state.fadeAngle * Math.PI / 180;
        const context = {
          width,
          height,
          aspectY: height / width,
          directionX: Math.cos(angle),
          directionY: Math.sin(angle),
          imageSampler,
          centers: []
        };
        if (state.sizeField === "radial") context.centers = createRadialCenters(width, height);
        return context;
      }

      function createRadialCenters(width, height) {
        const count = Math.max(1, Math.round(state.fieldCount));
        if (count === 1) return [{ x: state.fieldCenterX, y: state.fieldCenterY }];
        const centers = [];
        if (state.fieldLayout === "random") {
          for (let index = 0; index < count; index++) {
            const x = state.fieldCenterX + (hash2(index, 193, state.seed) - .5) * state.fieldSpread;
            const y = state.fieldCenterY + (hash2(index, 719, state.seed) - .5) * state.fieldSpread;
            centers.push({ x: clamp(x, 0, 1), y: clamp(y, 0, 1) });
          }
          return centers;
        }
        const canvasRatio = width / height;
        const columns = Math.max(1, Math.ceil(Math.sqrt(count * canvasRatio)));
        const rows = Math.ceil(count / columns);
        for (let index = 0; index < count; index++) {
          const column = index % columns;
          const row = Math.floor(index / columns);
          const tx = columns === 1 ? 0 : column / (columns - 1) - .5;
          const ty = rows === 1 ? 0 : row / (rows - 1) - .5;
          centers.push({
            x: clamp(state.fieldCenterX + tx * state.fieldSpread, 0, 1),
            y: clamp(state.fieldCenterY + ty * state.fieldSpread, 0, 1)
          });
        }
        return centers;
      }

      function sampleSizeField(x, y, column, row, context) {
        let value = 0;
        if (state.sizeField === "linear") {
          const projected = .5 + (x - .5) * context.directionX + (y - .5) * context.directionY;
          value = clamp((projected - state.fadeStart) / Math.max(state.fadeWidth, .001), 0, 1);
        } else if (state.sizeField === "radial") {
          let nearest = Infinity;
          for (const center of context.centers) {
            const dx = x - center.x;
            const dy = (y - center.y) * context.aspectY;
            nearest = Math.min(nearest, Math.hypot(dx, dy));
          }
          value = clamp(nearest / Math.max(state.fieldRadius, .001), 0, 1);
        } else if (state.sizeField === "grid") {
          const localX = (x * Math.round(state.fieldGridX)) % 1 - .5;
          const localY = (y * Math.round(state.fieldGridY)) % 1 - .5;
          const distance = Math.hypot(localX * 2, localY * 2);
          value = clamp(distance / Math.max(state.fieldRadius, .001), 0, 1);
        } else if (state.sizeField === "random") {
          value = state.randomType === "cell"
            ? hash2(column, row, state.seed + 991)
            : valueNoise(x * state.randomScale, y * state.randomScale, state.seed + 991);
        } else if (state.sizeField === "image") {
          value = sampleImageLuminance(context.imageSampler, x, y);
        }

        if (state.sizeField !== "image" && state.imageInfluence > 0 && context.imageSampler) {
          value = lerp(value, sampleImageLuminance(context.imageSampler, x, y), state.imageInfluence);
        }
        return value;
      }

      function createImageSampler(width, height) {
        if (!sourceImage || !sourceImage.complete) return null;
        const sampler = document.createElement("canvas");
        sampler.width = 256;
        sampler.height = Math.max(1, Math.round(256 * height / width));
        const samplerContext = sampler.getContext("2d", { willReadFrequently: true });
        samplerContext.fillStyle = "#ffffff";
        samplerContext.fillRect(0, 0, sampler.width, sampler.height);
        drawFittedImage(samplerContext, sourceImage, sampler.width, sampler.height, state.imageFit);
        try {
          return { width: sampler.width, height: sampler.height, data: samplerContext.getImageData(0, 0, sampler.width, sampler.height).data };
        } catch {
          return null;
        }
      }

      function sampleImageLuminance(sampler, x, y) {
        if (!sampler) return 0;
        const px = clamp(Math.floor(x * sampler.width), 0, sampler.width - 1);
        const py = clamp(Math.floor(y * sampler.height), 0, sampler.height - 1);
        const index = (py * sampler.width + px) * 4;
        const red = sampler.data[index];
        const green = sampler.data[index + 1];
        const blue = sampler.data[index + 2];
        return (red * .2126 + green * .7152 + blue * .0722) / 255;
      }

      function drawFittedImage(ctx, image, width, height, fit) {
        if (fit === "stretch") {
          ctx.drawImage(image, 0, 0, width, height);
          return;
        }
        const imageRatio = image.naturalWidth / image.naturalHeight;
        const targetRatio = width / height;
        const cover = fit === "cover";
        let drawWidth;
        let drawHeight;
        if ((imageRatio > targetRatio) === cover) {
          drawHeight = height;
          drawWidth = drawHeight * imageRatio;
        } else {
          drawWidth = width;
          drawHeight = drawWidth / imageRatio;
        }
        ctx.drawImage(image, (width - drawWidth) / 2, (height - drawHeight) / 2, drawWidth, drawHeight);
      }

      function insideMask(x, y) {
        if (state.maskShape === "full") return true;
        const dx = (x - state.maskX) / Math.max(state.maskWidth * .5, .001);
        const dy = (y - state.maskY) / Math.max(state.maskHeight * .5, .001);
        if (state.maskShape === "ellipse") return dx * dx + dy * dy <= 1;
        return Math.abs(dx) <= 1 && Math.abs(dy) <= 1;
      }

      function drawShape(ctx, shape, size) {
        ctx.beginPath();
        if (shape === "triangle") {
          for (let i = 0; i < 3; i++) {
            const a = -Math.PI / 2 + i * Math.PI * 2 / 3;
            const x = Math.cos(a) * size;
            const y = Math.sin(a) * size;
            i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        } else if (shape === "circle") {
          ctx.arc(0, 0, size * .72, 0, Math.PI * 2);
          ctx.fill();
        } else if (shape === "square") {
          const side = size * 1.22;
          ctx.rect(-side / 2, -side / 2, side, side);
          ctx.fill();
        } else if (shape === "diamond") {
          ctx.moveTo(0, -size);
          ctx.lineTo(size * .72, 0);
          ctx.lineTo(0, size);
          ctx.lineTo(-size * .72, 0);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.lineWidth = Math.max(1, size * .3);
          ctx.strokeStyle = state.foreground;
          ctx.lineCap = "round";
          ctx.moveTo(-size, 0);
          ctx.lineTo(size, 0);
          ctx.stroke();
        }
      }

      function exportPng() {
        const ratio = parseRatio();
        const outWidth = Math.round(state.resolution);
        const outHeight = Math.round(outWidth / ratio);
        const logicalWidth = 1000;
        const logicalHeight = logicalWidth / ratio;
        const canvas = document.createElement("canvas");
        canvas.width = outWidth;
        canvas.height = outHeight;
        const ctx = canvas.getContext("2d");
        ctx.setTransform(outWidth / logicalWidth, 0, 0, outWidth / logicalWidth, 0, 0);
        drawField(ctx, logicalWidth, logicalHeight);
        canvas.toBlob(blob => {
          if (!blob) return;
          downloadBlob(blob, `halftone-field-${Date.now()}.png`);
          toast(`PNG 已导出 · ${outWidth} × ${outHeight}`);
        }, "image/png");
      }

      function exportJson() {
        const payload = { app: "Halftone Field", version: 1, name: currentConfig.name, state };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        downloadBlob(blob, `halftone-config-${Date.now()}.json`);
        toast("参数配置 JSON 已导出");
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function getFitZoom() {
        const shell = els.canvasShell.getBoundingClientRect();
        const canvas = els.preview.getBoundingClientRect();
        const currentZoom = view.zoom || 1;
        const naturalWidth = canvas.width / currentZoom;
        const naturalHeight = canvas.height / currentZoom;
        return Math.min((shell.width - 76) / naturalWidth, (shell.height - 76) / naturalHeight, 1.25);
      }

      function fitCanvas() {
        view.x = 0;
        view.y = 0;
        requestAnimationFrame(() => {
          view.fitZoom = getFitZoom();
          view.zoom = view.fitZoom;
          updateCanvasTransform();
        });
      }

      function updateCanvasTransform() {
        els.canvasHolder.style.transform = `translate(calc(-50% + ${view.x}px), calc(-50% + ${view.y}px)) scale(${view.zoom})`;
        els.zoomValue.textContent = `${Math.round(view.zoom * 100)}%`;
      }

      function setZoom(next, center = null) {
        const old = view.zoom;
        view.zoom = clamp(next, .12, 4);
        if (center && old !== view.zoom) {
          const rect = els.canvasShell.getBoundingClientRect();
          const px = center.x - rect.left - rect.width / 2;
          const py = center.y - rect.top - rect.height / 2;
          const ratio = view.zoom / old;
          view.x = px - (px - view.x) * ratio;
          view.y = py - (py - view.y) * ratio;
        }
        updateCanvasTransform();
      }

      function toast(message) {
        const item = document.createElement("div");
        item.className = "toast";
        item.textContent = message;
        els.toastStack.append(item);
        setTimeout(() => {
          item.style.opacity = "0";
          item.style.transform = "translateX(8px)";
          item.style.transition = ".2s";
          setTimeout(() => item.remove(), 220);
        }, 2300);
      }

      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function smoothstep(t) { return t * t * (3 - 2 * t); }

      function hash2(x, y, seed) {
        let n = Math.imul(x | 0, 374761393) + Math.imul(y | 0, 668265263) + Math.imul(seed | 0, 1442695041);
        n = Math.imul(n ^ (n >>> 13), 1274126177);
        return ((n ^ (n >>> 16)) >>> 0) / 4294967295;
      }

      function valueNoise(x, y, seed) {
        const xi = Math.floor(x);
        const yi = Math.floor(y);
        const tx = smoothstep(x - xi);
        const ty = smoothstep(y - yi);
        const a = hash2(xi, yi, seed);
        const b = hash2(xi + 1, yi, seed);
        const c = hash2(xi, yi + 1, seed);
        const d = hash2(xi + 1, yi + 1, seed);
        return lerp(lerp(a, b, tx), lerp(c, d, tx), ty);
      }

      document.querySelector("#saveConfigBtn").addEventListener("click", saveCurrent);
      document.querySelector("#saveAsBtn").addEventListener("click", () => openNameModal("save"));
      document.querySelector("#resetBtn").addEventListener("click", resetAll);
      document.querySelector("#randomizeBtn").addEventListener("click", randomizeSeed);
      document.querySelector("#exportBtn").addEventListener("click", exportPng);
      document.querySelector("#jsonBtn").addEventListener("click", exportJson);
      document.querySelector("#cancelModal").addEventListener("click", closeNameModal);
      document.querySelector("#zoomIn").addEventListener("click", () => setZoom(view.zoom * 1.18));
      document.querySelector("#zoomOut").addEventListener("click", () => setZoom(view.zoom / 1.18));

      els.nameForm.addEventListener("submit", event => {
        event.preventDefault();
        const name = els.configName.value.trim();
        if (!name) return;
        if (modalMode === "rename") renameConfig(editingConfigId, name);
        else saveNew(name);
        closeNameModal();
      });

      els.nameModal.addEventListener("mousedown", event => {
        if (event.target === els.nameModal) closeNameModal();
      });

      els.contextMenu.addEventListener("click", event => {
        const action = event.target.dataset.action;
        const config = userConfigs.find(item => item.id === contextConfigId);
        if (!config) return;
        if (action === "rename") openNameModal("rename", config);
        if (action === "duplicate") duplicateConfig(config.id);
        if (action === "delete") deleteConfig(config.id);
        closeContextMenu();
      });

      document.addEventListener("pointerdown", event => {
        if (!els.contextMenu.contains(event.target)) closeContextMenu();
      });

      els.canvasShell.addEventListener("wheel", event => {
        event.preventDefault();
        setZoom(view.zoom * Math.exp(-event.deltaY * .0012), { x: event.clientX, y: event.clientY });
      }, { passive: false });

      let drag = null;
      els.canvasShell.addEventListener("pointerdown", event => {
        if (event.target.closest(".zoom-control")) return;
        drag = { x: event.clientX, y: event.clientY, startX: view.x, startY: view.y };
        els.canvasShell.setPointerCapture(event.pointerId);
        els.canvasShell.classList.add("dragging");
      });
      els.canvasShell.addEventListener("pointermove", event => {
        if (!drag) return;
        view.x = drag.startX + event.clientX - drag.x;
        view.y = drag.startY + event.clientY - drag.y;
        updateCanvasTransform();
      });
      els.canvasShell.addEventListener("pointerup", () => {
        drag = null;
        els.canvasShell.classList.remove("dragging");
      });
      els.canvasShell.addEventListener("dblclick", fitCanvas);

      window.addEventListener("keydown", event => {
        if (event.key === "Escape") { closeNameModal(); closeContextMenu(); }
        if (event.key.toLowerCase() === "r" && !event.metaKey && !event.ctrlKey && !/INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) randomizeSeed();
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") { event.preventDefault(); saveCurrent(); }
      });

      const resizeObserver = new ResizeObserver(() => fitCanvas());
      resizeObserver.observe(els.canvasShell);

      buildControls();
      syncControls();
      loadSourceImage(state.imageData);
      renderPresetList();
      syncDirtyState();
      renderPreview();
      fitCanvas();
    })();
  </script>
</body>
</html>
